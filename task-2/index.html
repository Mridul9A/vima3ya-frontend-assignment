<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GLB Model Viewer — Gem</title>
  <style>
    /* ── Design: dark industrial / crystal aesthetic ────────────── */
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@300;400&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #050810;
      --surface:   #0c1120;
      --border:    #1a2540;
      --accent:    #00d4ff;
      --accent2:   #7b2fff;
      --text:      #c8d8f0;
      --text-dim:  #4a5a7a;
      --gem:       #05b8e8;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      overflow: hidden;
    }

    /* ── Canvas ─────────────────────────────────────────────────── */
    #canvas-container {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    /* ── Noise grain overlay ─────────────────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 1;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.03;
      pointer-events: none;
    }

    /* ── HUD top-bar ─────────────────────────────────────────────── */
    #hud {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 32px;
      background: linear-gradient(180deg, rgba(5,8,16,0.95) 0%, transparent 100%);
    }

    #hud-title {
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    #hud-title span {
      color: var(--accent);
    }

    #hud-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--text-dim);
      border: 1px solid var(--border);
      padding: 4px 12px;
      border-radius: 2px;
    }

    /* ── Bottom info panel ───────────────────────────────────────── */
    #info-panel {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 10;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 0 32px 28px;
      background: linear-gradient(0deg, rgba(5,8,16,0.95) 0%, transparent 100%);
      pointer-events: none;
    }

    #model-name {
      font-size: 52px;
      font-weight: 800;
      line-height: 0.95;
      letter-spacing: -0.03em;
      color: #fff;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    #model-name.visible {
      opacity: 1;
      transform: translateY(0);
    }

    #model-name sup {
      font-size: 14px;
      font-weight: 400;
      color: var(--accent);
      letter-spacing: 0.1em;
      vertical-align: super;
      font-family: 'JetBrains Mono', monospace;
    }

    #stats-block {
      text-align: right;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-dim);
      line-height: 2;
      opacity: 0;
      transition: opacity 0.6s ease 0.3s;
    }

    #stats-block.visible {
      opacity: 1;
    }

    #stats-block .stat-val {
      color: var(--accent);
      margin-left: 8px;
    }

    /* ── Controls hint ───────────────────────────────────────────── */
    #controls-hint {
      position: fixed;
      top: 50%;
      right: 32px;
      transform: translateY(-50%);
      z-index: 10;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.12em;
      writing-mode: vertical-rl;
      opacity: 0;
      transition: opacity 0.6s ease 0.5s;
    }

    #controls-hint.visible {
      opacity: 0.5;
    }

    /* ── Loading overlay ─────────────────────────────────────────── */
    #loading-overlay {
      position: fixed; inset: 0;
      z-index: 100;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      transition: opacity 0.5s ease;
    }

    #loading-overlay.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .gem-spinner {
      width: 64px;
      height: 64px;
      position: relative;
    }

    .gem-spinner svg {
      width: 100%; height: 100%;
      animation: spin 2s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .gem-spinner svg polygon {
      fill: none;
      stroke: var(--accent);
      stroke-width: 1.5;
    }

    .gem-spinner svg polygon:nth-child(2) {
      stroke: var(--accent2);
      stroke-dasharray: 40 20;
      animation: dash 1.5s linear infinite reverse;
    }

    @keyframes dash {
      from { stroke-dashoffset: 0; }
      to   { stroke-dashoffset: -60; }
    }

    #loading-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    #loading-label span {
      color: var(--accent);
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    /* ── Progress bar ─────────────────────────────────────────────── */
    #progress-wrap {
      width: 200px;
      height: 1px;
      background: var(--border);
      position: relative;
      overflow: hidden;
    }

    #progress-bar {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      width: 0%;
      transition: width 0.3s ease;
      box-shadow: 0 0 12px var(--accent);
    }

    /* progress shimmer when indeterminate */
    #progress-bar.indeterminate {
      width: 40% !important;
      animation: shimmer 1.2s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%   { left: -40%; }
      100% { left: 100%; }
    }

    /* ── Scan line animation on canvas reveal ─────────────────────── */
    #scan-line {
      position: fixed;
      left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      z-index: 5;
      top: -2px;
      opacity: 0;
      box-shadow: 0 0 20px var(--accent), 0 0 60px var(--accent);
      transition: none;
    }

    #scan-line.scanning {
      animation: scan-down 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes scan-down {
      0%   { top: 0; opacity: 1; }
      100% { top: 100vh; opacity: 0; }
    }

    /* ── Crosshair center ────────────────────────────────────────── */
    #crosshair {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 5;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s ease 0.8s;
    }

    #crosshair.visible {
      opacity: 0.15;
    }

    #crosshair::before, #crosshair::after {
      content: '';
      position: absolute;
      background: var(--accent);
    }

    #crosshair::before {
      width: 1px; height: 20px;
      top: -10px; left: 0;
    }

    #crosshair::after {
      height: 1px; width: 20px;
      left: -10px; top: 0;
    }
  </style>
</head>
<body>

  <!-- Loading overlay -->
  <div id="loading-overlay">
    <div class="gem-spinner">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <polygon points="50,10 90,35 90,65 50,90 10,65 10,35"/>
        <polygon points="50,10 90,35 90,65 50,90 10,65 10,35"/>
      </svg>
    </div>
    <div id="loading-label">INITIALIZING<span>_</span></div>
    <div id="progress-wrap">
      <div id="progress-bar" class="indeterminate"></div>
    </div>
  </div>

  <!-- Scan effect -->
  <div id="scan-line"></div>

  <!-- HUD -->
  <div id="hud">
    <div id="hud-title">THREE.JS VIEWER &nbsp;/&nbsp; <span>GLB</span></div>
    <div id="hud-badge">DRACO · OPTIMIZED</div>
  </div>

  <!-- Canvas -->
  <div id="canvas-container"></div>

  <!-- Crosshair -->
  <div id="crosshair"></div>

  <!-- Bottom panel -->
  <div id="info-panel">
    <div id="model-name">GEM<br/><span style="color:var(--accent);font-size:22px;font-weight:400;letter-spacing:0.05em">CRYSTAL.001</span></div>
    <div id="stats-block">
      <div>VERTICES<span class="stat-val" id="stat-verts">—</span></div>
      <div>TRIANGLES<span class="stat-val" id="stat-tris">—</span></div>
      <div>LOAD TIME<span class="stat-val" id="stat-time">—</span></div>
      <div>SIZE<span class="stat-val" id="stat-size">1.6 KB</span></div>
    </div>
  </div>

  <!-- Controls hint -->
  <div id="controls-hint">DRAG TO ROTATE · SCROLL TO ZOOM</div>

  <script type="module">
    // ── Step 3: Lazy-load Three.js via dynamic import ──────────────────────────
    // This prevents Three.js (~600KB) from blocking the initial page render.
    // The browser can paint the loading UI immediately, then fetch Three.js
    // asynchronously. Without this, the blank white flash would last ~1-2s
    // on slow connections before any pixel renders.

    const loadingLabel = document.getElementById('loading-label');

    function setLoadingText(text) {
      loadingLabel.innerHTML = text + '<span>_</span>';
    }

    setLoadingText('LOADING THREE.JS');

    // Dynamic import — Three.js is fetched only after first paint
    const [THREE, { GLTFLoader }, { DRACOLoader }] = await Promise.all([
      import('https://esm.sh/three@0.160.0'),
      import('https://esm.sh/three@0.160.0/examples/jsm/loaders/GLTFLoader.js'),
      import('https://esm.sh/three@0.160.0/examples/jsm/loaders/DRACOLoader.js'),
    ]);

    setLoadingText('SETTING UP SCENE');

    // ── Scene setup ───────────────────────────────────────────────────────────
    const container = document.getElementById('canvas-container');

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.4;
    container.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050810);

    // Subtle fog for depth
    scene.fog = new THREE.FogExp2(0x050810, 0.08);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0.5, 5);

    // ── Lighting ──────────────────────────────────────────────────────────────
    const ambient = new THREE.AmbientLight(0x112244, 1.5);
    scene.add(ambient);

    const keyLight = new THREE.DirectionalLight(0x00d4ff, 4);
    keyLight.position.set(3, 5, 3);
    scene.add(keyLight);

    const fillLight = new THREE.DirectionalLight(0x7b2fff, 2.5);
    fillLight.position.set(-4, -1, -2);
    scene.add(fillLight);

    const rimLight = new THREE.DirectionalLight(0xffffff, 1.5);
    rimLight.position.set(0, -3, -5);
    scene.add(rimLight);

    // ── Grid floor ────────────────────────────────────────────────────────────
    const gridHelper = new THREE.GridHelper(20, 30, 0x0a1428, 0x0a1428);
    gridHelper.position.y = -2;
    scene.add(gridHelper);

    // ── Particle field ────────────────────────────────────────────────────────
    const particleGeo = new THREE.BufferGeometry();
    const PARTICLE_COUNT = 800;
    const positions = new Float32Array(PARTICLE_COUNT * 3);
    for (let i = 0; i < PARTICLE_COUNT * 3; i++) {
      positions[i] = (Math.random() - 0.5) * 30;
    }
    particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const particleMat = new THREE.PointsMaterial({
      color: 0x1a3560,
      size: 0.04,
      transparent: true,
      opacity: 0.8,
      sizeAttenuation: true,
    });
    const particles = new THREE.Points(particleGeo, particleMat);
    scene.add(particles);

    // ── Step 2: Load GLB with DRACOLoader ─────────────────────────────────────
    const dracoLoader = new DRACOLoader();
    dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');

    const loader = new GLTFLoader();
    loader.setDRACOLoader(dracoLoader);

    setLoadingText('LOADING MODEL');

    const start = performance.now();  // ← track load time

    let modelMesh = null;
    let mixer = null;

    loader.load(
      './model.glb',

      // onLoad
      (gltf) => {
        const loadTime = performance.now() - start;
        console.log(`Model loaded in ${loadTime.toFixed(2)}ms`);

        const model = gltf.scene;

        // Override material for extra visual punch
        model.traverse((child) => {
          if (child.isMesh) {
            child.material = new THREE.MeshPhysicalMaterial({
              color: 0x05b8e8,
              metalness: 0.95,
              roughness: 0.02,
              transmission: 0.3,
              thickness: 1.5,
              ior: 2.4,
              envMapIntensity: 1.5,
              transparent: true,
              opacity: 0.92,
            });
            modelMesh = child;
          }
        });

        // Center & scale
        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale = 2.2 / maxDim;
        model.scale.setScalar(scale);
        model.position.sub(center.multiplyScalar(scale));

        scene.add(model);
        loadedModel = model;

        // Update stats
        let totalVerts = 0, totalTris = 0;
        model.traverse(child => {
          if (child.isMesh) {
            totalVerts += child.geometry.attributes.position.count;
            totalTris  += child.geometry.index
              ? child.geometry.index.count / 3
              : child.geometry.attributes.position.count / 3;
          }
        });
        document.getElementById('stat-verts').textContent = totalVerts;
        document.getElementById('stat-tris').textContent  = totalTris;
        document.getElementById('stat-time').textContent  = `${loadTime.toFixed(0)}ms`;

        // ── Remove loading overlay ─────────────────────────────────
        const overlay = document.getElementById('loading-overlay');
        overlay.classList.add('fade-out');
        setTimeout(() => overlay.remove(), 600);

        // Scan line reveal effect
        setTimeout(() => {
          document.getElementById('scan-line').classList.add('scanning');
        }, 300);

        // Show UI elements
        setTimeout(() => {
          document.getElementById('model-name').classList.add('visible');
          document.getElementById('stats-block').classList.add('visible');
          document.getElementById('controls-hint').classList.add('visible');
          document.getElementById('crosshair').classList.add('visible');
        }, 500);
      },

      // onProgress
      (xhr) => {
        if (xhr.total > 0) {
          const pct = (xhr.loaded / xhr.total) * 100;
          const bar = document.getElementById('progress-bar');
          bar.classList.remove('indeterminate');
          bar.style.width = pct + '%';
          setLoadingText(`LOADING ${Math.round(pct)}%`);
        }
      },

      // onError
      (err) => {
        console.error('GLB load error:', err);
        setLoadingText('ERROR LOADING MODEL');
      }
    );

    // ── Orbit controls (manual implementation — no import needed) ─────────────
    let isDragging = false;
    let prevX = 0, prevY = 0;
    let rotY = 0, rotX = 0;
    let autoRotate = true;

    renderer.domElement.addEventListener('mousedown', (e) => {
      isDragging = true;
      autoRotate = false;
      prevX = e.clientX; prevY = e.clientY;
    });

    renderer.domElement.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      const dx = e.clientX - prevX;
      const dy = e.clientY - prevY;
      rotY += dx * 0.008;
      rotX += dy * 0.008;
      rotX = Math.max(-Math.PI/2.2, Math.min(Math.PI/2.2, rotX));
      prevX = e.clientX; prevY = e.clientY;
    });

    window.addEventListener('mouseup', () => { isDragging = false; });

    // Touch support
    renderer.domElement.addEventListener('touchstart', (e) => {
      isDragging = true; autoRotate = false;
      prevX = e.touches[0].clientX; prevY = e.touches[0].clientY;
    }, { passive: true });

    renderer.domElement.addEventListener('touchmove', (e) => {
      if (!isDragging) return;
      const dx = e.touches[0].clientX - prevX;
      const dy = e.touches[0].clientY - prevY;
      rotY += dx * 0.008;
      rotX += dy * 0.008;
      rotX = Math.max(-Math.PI/2.2, Math.min(Math.PI/2.2, rotX));
      prevX = e.touches[0].clientX; prevY = e.touches[0].clientY;
    }, { passive: true });

    window.addEventListener('touchend', () => { isDragging = false; });

    // Scroll zoom
    let camZ = 5;
    window.addEventListener('wheel', (e) => {
      camZ = Math.max(2, Math.min(10, camZ + e.deltaY * 0.01));
    });

    // ── Resize handler ────────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ── Animation loop ────────────────────────────────────────────────────────
    const clock = new THREE.Clock();
    let loadedModel = null; // set when GLTF loads

    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();

      // Auto-rotate if user hasn't interacted
      if (autoRotate) {
        rotY = t * 0.4;
      }

      // Rotate loaded model
      if (loadedModel) {
        loadedModel.rotation.y = rotY;
        loadedModel.rotation.x = rotX;
      }

      // Gentle particle drift
      particles.rotation.y = t * 0.02;
      particles.rotation.x = t * 0.008;

      // Smooth camera z
      camera.position.z += (camZ - camera.position.z) * 0.08;

      renderer.render(scene, camera);
    }

    animate();

    // ── Memory cleanup on page unload ────────────────────────────────────────
    // If you skip dispose() in a long-running SPA session, GPU memory leaks:
    // geometries, textures, and materials pile up, causing frame drops and
    // eventual browser crashes. See NOTES.md for full explanation.
    window.addEventListener('beforeunload', () => {
      scene.traverse((obj) => {
        if (obj.isMesh) {
          obj.geometry.dispose();
          if (Array.isArray(obj.material)) {
            obj.material.forEach(m => m.dispose());
          } else {
            obj.material.dispose();
          }
        }
      });
      particleGeo.dispose();
      particleMat.dispose();
      renderer.dispose();
      dracoLoader.dispose();
    });
  </script>
</body>
</html>
